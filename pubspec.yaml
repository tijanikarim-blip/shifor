name: shifor
description: Driver Recruitment Platform - Connect drivers with companies
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.2
  
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  
  url_launcher: ^6.2.4
  
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/shifor_app_icon.png"
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/shifor_app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/